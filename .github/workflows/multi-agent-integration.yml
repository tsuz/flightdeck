name: Multi-Agent Integration

# Manual, gating integration test for examples/multi-agent-setup.
#
# It runs in the context of a pull request but does NOT execute on its own: the
# `e2e` job is bound to the `integration-tests` environment, so it sits in a
# "Waiting" state until a human approves it ("Review deployments" → Approve) — no
# image is built and no Claude API call is made before that tap. Once approved it
# runs end to end; a new commit re-arms the gate (must be re-approved).
#
# It hits the real Claude API and needs CLAUDE_API_KEY, so it is intentionally
# not run automatically.
#
# ── One-time setup in the GitHub UI ─────────────────────────────────────────
#  1. Settings → Environments → New environment: "integration-tests"
#       • enable "Required reviewers" and add the maintainer(s)  ← this is the tap
#       • add secret CLAUDE_API_KEY to the environment (or as a repo secret)
#  2. Settings → Branches → branch protection rule for the target branch
#       • Require status checks to pass before merging
#       • add: "Orchestrator → Worker round-trip"
#     → the PR cannot merge until this test has been approved and has passed.

on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    name: Orchestrator → Worker round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Required-reviewer protection on this environment is what makes the job
    # wait for a manual tap before doing any work.
    environment: integration-tests

    steps:
      - uses: actions/checkout@v4

      - name: Run integration test
        working-directory: examples/multi-agent-setup
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TIMEOUT: "300"
        run: ./integration-test.sh

      - name: Tear down (backstop)
        if: always()
        working-directory: examples/multi-agent-setup
        run: docker compose -p multiagent-it down -v || true
