name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  processing-tests:
    name: Processing Stream App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run tests
        working-directory: processor-apps/processing
        run: mvn test
