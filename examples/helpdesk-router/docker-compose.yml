      - ./it-agent/tools.json:/app/tools.json:ro
      - ./it-agent/system-prompt.txt:/app/system-prompt.txt:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AGENT_NAME: it-agent
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      CLAUDE_MODEL: ${IT_CLAUDE_MODEL:-claude-sonnet-4-5}
      CLAUDE_MAX_TOKENS: ${CLAUDE_MAX_TOKENS:-8096}
      INPUT_TOKEN_PRICE: ${INPUT_TOKEN_PRICE:-3}
      OUTPUT_TOKEN_PRICE: ${OUTPUT_TOKEN_PRICE:-15}
      BUDGET_PRICE_PER_SESSION: ${BUDGET_PRICE_PER_SESSION:-}
      COMPACTION_USER_MESSAGE_TRIGGER: ${COMPACTION_USER_MESSAGE_TRIGGER:--1}
      COMPACTION_USER_MESSAGE_UNTIL: ${COMPACTION_USER_MESSAGE_UNTIL:-2}
      TOOLS_JSON_FILE: /app/tools.json
      SYSTEM_PROMPT_FILE: /app/system-prompt.txt
    depends_on:
      kafka:
        condition: service_healthy

  it-agent-tool-service:
    build:
      context: ../..
      dockerfile: examples/helpdesk-router/it-agent/tool-service/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AGENT_NAME: it-agent
    depends_on:
      kafka:
        condition: service_healthy

