services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:4.1.1
    hostname: kafka
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Application Services ───────────────────────────────────────────────────

  api:
    image: ghcr.io/tsuz/flightdeck/chat-api:${FLIGHTDECK_VERSION:-latest}
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AGENT_NAME: ${AGENT_NAME:-lead-followup}
      PORT: 8000
      WS_PORT: 8001
    depends_on:
      kafka:
        condition: service_healthy

  processing:
    image: ghcr.io/tsuz/flightdeck/processing:${FLIGHTDECK_VERSION:-latest}
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AGENT_NAME: ${AGENT_NAME:-lead-followup}
      MEMOIR_ENABLED: "false"
    depends_on:
      kafka:
        condition: service_healthy

  think-consumer:
    image: ghcr.io/tsuz/flightdeck/think-consumer:${FLIGHTDECK_VERSION:-latest}
    volumes:
      - ./tools.json:/app/tools.json:ro
      - ./system-prompt.txt:/app/system-prompt.txt:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AGENT_NAME: ${AGENT_NAME:-lead-followup}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      CLAUDE_MAX_TOKENS: ${CLAUDE_MAX_TOKENS:-8096}
      INPUT_TOKEN_PRICE: ${INPUT_TOKEN_PRICE:-1}
      OUTPUT_TOKEN_PRICE: ${OUTPUT_TOKEN_PRICE:-5}
      BUDGET_PRICE_PER_SESSION: ${BUDGET_PRICE_PER_SESSION:-0.5}
      TOOLS_JSON_FILE: /app/tools.json
      SYSTEM_PROMPT_FILE: /app/system-prompt.txt
    depends_on:
      kafka:
        condition: service_healthy

  lead-tool-service:
    build:
      context: ../..
      dockerfile: examples/lead-followup-agent/lead-tool-service/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AGENT_NAME: ${AGENT_NAME:-lead-followup}
    depends_on:
      kafka:
        condition: service_healthy

  # ─── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    image: ghcr.io/tsuz/flightdeck/frontend:${FLIGHTDECK_VERSION:-latest}
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  kafka-data:
