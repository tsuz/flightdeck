services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:4.1.1
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Application Services ───────────────────────────────────────────────────

  api:
    build: ../../api/chat-api
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AGENT_NAME: memoir-chatbot
      PORT: 8000
      WS_PORT: 8001
    depends_on:
      kafka:
        condition: service_healthy

  processing:
    build: ../../processor-apps/processing
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AGENT_NAME: memoir-chatbot
      MEMOIR_ENABLED: "true"
      MEMOIR_SESSION_INACTIVITY_THRESHOLD_SECONDS: 30
      MEMOIR_SESSION_PUNCTUATE_INTERVAL_SECONDS: 5
    depends_on:
      kafka:
        condition: service_healthy

  think-consumer:
    build: ../../think/think-consumer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AGENT_NAME: memoir-chatbot
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      CLAUDE_MAX_TOKENS: ${CLAUDE_MAX_TOKENS:-8096}
    depends_on:
      kafka:
        condition: service_healthy

  memoir-consumer:
    build: ../../memoir/update-memoir-consumer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AGENT_NAME: memoir-chatbot
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
    depends_on:
      kafka:
        condition: service_healthy

  # ─── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build: ../../frontend
    ports:
      - "80:80"
    depends_on:
      - api
